<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Email</title>
  <link rel="stylesheet" href="WelcomeEmail.css">
</head>
<body>
  <div class="email-wrapper">
    <div class="email-container">
      <h1>BARKBOX</h1>

      <div class="separator"></div>

      <div class="site-links">
        <a href="https://bark.co/collections/featured-items" target="_blank">Toys &amp; Treats</a>
        <a href="https://bark.co/products/belly-food-chicken-ancient-grains" target="_blank">Food</a>
        <a href="https://bark.co/collections/gift-boxes" target="_blank">Gifts</a>
        <a href="https://bark.co/pages/contact" target="_blank">Contact Us</a>
      </div>

      <div class="separator"></div>

      <p class="p1">Welcome to BarkBox</p>
      <p class="p2">Thanks for joining the pack.</p>

      <img class="barkbox" src="barkbox.PNG" alt="BarkBox logo">

      <div class="features">
        <div class="section">
          <img src="dogToy.jpeg" alt="Dog toy">
          <p class="title">Fun <br>Toys</p>
          <p class="desc">Curated for your pup</p>
        </div>

        <div class="section">
          <img src="truck.webp" alt="Delivery truck">
          <p class="title">Fast <br>Shipping</p>
          <p class="desc">Delivered to your door</p>
        </div>

        <div class="section">
          <img src="flexibility.webp" alt="Flexible subscription">
          <p class="title">Flexible <br>Subscription</p>
          <p class="desc">Pause anytime</p>
        </div>
      </div>

      <div class="buttons">
        <a class="button1" href="https://bark.co/pages/subscription-funnel/barkbox-subscription-funnel-fext-promo-ff" target="_blank">
          Build Your Box
        </a>

        <a class="button2" href="https://bark.co/collections/featured-items" target="_blank">
          Explore Toys
        </a>
      </div>

      <div class="separator"></div>

      <div class="site-links footer-links">
        <a href="https://www.barkbox.com" target="_blank">BarkBox.com</a>
        <a href="https://www.facebook.com/barkbox/" target="_blank">Facebook</a>
        <a href="https://x.com/barkbox" target="_blank">Twitter.com</a>
      </div>
    </div>
  </div>
</body>
</html>
